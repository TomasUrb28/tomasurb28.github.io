<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MU/TH/UR 6000 — EDITOR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #4dff7c;
      --green-dim:  #2ecc55;
      --green-dark: #1a5c2e;
      --green-glow: #4dff7c30;
      --amber:      #ffb000;
      --red:        #ff5555;
      --bg:         #0a1a0d;
      --font: 'Courier New', Courier, monospace;
    }

    html, body {
      height: 100%;
      background: #060f08;
      color: var(--green);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.75;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── LAYOUT ── */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      padding: .5rem 1rem;
      border-bottom: 1px solid var(--green-dark);
      background: rgba(0,255,65,.03);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .topbar-title {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: .12em;
      text-shadow: 0 0 6px var(--green);
    }

    .topbar a {
      color: var(--green-dim);
      text-decoration: none;
      font-size: .85rem;
      letter-spacing: .08em;
    }
    .topbar a:hover { color: var(--green); }

    .workspace {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 46px);
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--green-dark);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: .6rem .8rem;
      border-bottom: 1px solid var(--green-dark);
      font-size: .75rem;
      color: var(--green-dim);
      letter-spacing: .1em;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: .4rem 0;
    }

    .session-item {
      padding: .55rem .85rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(26,92,46,.4);
      transition: background .15s;
    }
    .session-item:hover  { background: rgba(0,255,65,.05); }
    .session-item.active { background: rgba(0,255,65,.09); border-left: 2px solid var(--green); }

    .session-item-title {
      font-size: .85rem;
      font-weight: bold;
      color: var(--green);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-item-sub {
      font-size: .75rem;
      color: var(--green-dim);
      margin-top: .1rem;
    }

    .session-item-status {
      font-size: .7rem;
      margin-top: .15rem;
    }
    .s-closed  { color: var(--green-dark); }
    .s-active  { color: var(--amber); }
    .s-pending { color: #888; }

    .btn-new {
      margin: .65rem .85rem;
      padding: .45rem .7rem;
      background: transparent;
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: var(--font);
      font-size: .82rem;
      letter-spacing: .1em;
      cursor: pointer;
      width: calc(100% - 1.7rem);
      text-align: left;
      transition: background .15s;
    }
    .btn-new:hover { background: rgba(0,255,65,.08); }
    .btn-new:disabled { opacity: .35; cursor: default; }

    /* ── EDITOR PANEL ── */
    .editor-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-toolbar {
      padding: .55rem 1rem;
      border-bottom: 1px solid var(--green-dark);
      display: flex;
      gap: .65rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: .4rem .85rem;
      background: transparent;
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: var(--font);
      font-size: .82rem;
      letter-spacing: .08em;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover    { background: rgba(0,255,65,.1); }
    .btn:disabled { opacity: .35; cursor: default; }

    .btn-danger {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-danger:hover { background: rgba(255,85,85,.1); }

    .btn-primary {
      border-color: var(--green);
      color: #000;
      background: var(--green);
      font-weight: bold;
    }
    .btn-primary:hover    { background: var(--green-dim); border-color: var(--green-dim); }
    .btn-primary:disabled { background: var(--green-dark); border-color: var(--green-dark); color: #555; }

    .status-msg {
      font-size: .78rem;
      margin-left: auto;
      color: var(--green-dim);
      letter-spacing: .06em;
    }
    .status-msg.ok    { color: var(--green); text-shadow: 0 0 4px var(--green-glow); }
    .status-msg.error { color: var(--red); }

    .editor-form {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: .8rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }

    .field label {
      font-size: .75rem;
      color: var(--green-dim);
      letter-spacing: .1em;
    }

    .field input,
    .field select,
    .field textarea {
      background: rgba(0,30,8,.8);
      border: 1px solid var(--green-dark);
      color: #b8e8c4;
      font-family: var(--font);
      font-size: .95rem;
      padding: .45rem .6rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--green-dim);
      box-shadow: 0 0 6px var(--green-glow);
    }

    .field select option { background: #0a1a0d; }

    .field textarea {
      resize: vertical;
      min-height: 340px;
      line-height: 1.75;
    }

    .hint {
      font-size: .72rem;
      color: var(--green-dark);
      margin-top: .15rem;
      letter-spacing: .04em;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green-dark);
      font-size: .85rem;
      letter-spacing: .08em;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: var(--green-dark); }
    ::selection { background: var(--green); color: #000; }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="topbar-title">MU/TH/UR 6000 // SESSION EDITOR</span>
    <a href="/cetorina-logs/">&larr; ZPĚT NA LOGY</a>
  </div>

  <div class="workspace">
    <div class="sidebar">
      <div class="sidebar-header">&gt; ZÁZNAMY V DATABÁZI</div>
      <div class="session-list" id="sessionList">
        <div style="padding:.6rem .85rem;color:var(--green-dark);font-size:.8rem;">NAČÍTÁM...</div>
      </div>
      <button class="btn-new" id="btnNew">[ + ] NOVÝ ZÁZNAM</button>
    </div>

    <div class="editor-panel">
      <div class="empty-state" id="emptyState">&gt; VYBERTE ZÁZNAM NEBO VYTVOŘTE NOVÝ</div>

      <div id="editorInner" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="editor-toolbar">
          <button class="btn btn-primary" id="btnSave">ULOŽIT &amp; PUBLIKOVAT</button>
          <button class="btn btn-danger"  id="btnDelete" style="display:none;">SMAZAT</button>
          <span class="status-msg" id="statusMsg"></span>
        </div>
        <div class="editor-form">
          <div class="form-row">
            <div class="field">
              <label>NÁZEV SESSION</label>
              <input type="text" id="fTitle" placeholder="ALIEN: HEART OF DARKNESS — KAPITOLA II" />
            </div>
            <div class="field">
              <label>PODTITUL / KAPITOLA</label>
              <input type="text" id="fSubtitle" placeholder="NÁZEV KAPITOLY" />
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label>LOKACE</label>
              <input type="text" id="fLocation" placeholder="Vědecká stanice Erebos — paluba C" />
            </div>
            <div class="field">
              <label>STATUS</label>
              <select id="fStatus">
                <option value="closed">UZAVŘENO</option>
                <option value="active">AKTIVNÍ</option>
                <option value="pending">ČEKÁ</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>POSÁDKA</label>
            <input type="text" id="fCrew" />
          </div>
          <div class="field">
            <label>TEXT ZÁPISKU</label>
            <textarea id="fBody" spellcheck="true"></textarea>
            <span class="hint">Odstavce odděluj prázdným řádkem. &nbsp;|&nbsp; Nadpis sekce: — NÁZEV SEKCE — (na vlastním řádku)</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── KONFIGURACE — vyplň po vytvoření Supabase projektu ──────────
// Obě hodnoty najdeš v Supabase: Settings → API
const SUPABASE_URL = 'TVUJ_SUPABASE_URL';   // např. https://abcxyz.supabase.co
const SUPABASE_KEY = 'TVUJ_ANON_KEY';        // začíná "eyJ..."
// ────────────────────────────────────────────────────────────────

const DEFAULT_CREW = 'Lugarová, Hedenström, Navarro, Drabikowská, Ejiri, Larková, Sajaadová';

const DB = `${SUPABASE_URL}/rest/v1/sessions`;
const H  = {
  'apikey':        SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type':  'application/json',
  'Prefer':        'return=representation'
};

let sessions = [];
let activeId = null;

// ── DATA ───────────────────────────────────────────────────────
async function loadData() {
  setStatus('NAČÍTÁM...', '');
  try {
    const res = await fetch(`${DB}?order=created_at.asc`, { headers: H });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    sessions = await res.json();
    renderSidebar();
    setStatus('', '');
  } catch (e) {
    setStatus('CHYBA: ' + e.message, 'error');
  }
}

async function upsert(data) {
  if (activeId) {
    // update
    const res = await fetch(`${DB}?id=eq.${activeId}`, {
      method: 'PATCH', headers: H,
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error((await res.json()).message || res.status);
    const rows = await res.json();
    const idx = sessions.findIndex(s => s.id === activeId);
    if (idx !== -1) sessions[idx] = rows[0];
  } else {
    // insert
    const res = await fetch(DB, {
      method: 'POST', headers: H,
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error((await res.json()).message || res.status);
    const rows = await res.json();
    sessions.push(rows[0]);
    activeId = rows[0].id;
  }
}

async function remove(id) {
  const res = await fetch(`${DB}?id=eq.${id}`, { method: 'DELETE', headers: H });
  if (!res.ok) throw new Error(res.status);
  sessions = sessions.filter(s => s.id !== id);
}

// ── SIDEBAR ────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<div style="padding:.6rem .85rem;color:var(--green-dark);font-size:.8rem;">ŽÁDNÉ ZÁZNAMY</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === activeId ? 'active' : ''}" data-id="${s.id}">
      <div class="session-item-title">${s.title}</div>
      <div class="session-item-sub">${s.subtitle || '—'}</div>
      <div class="session-item-status s-${s.status}">${s.status.toUpperCase()}</div>
    </div>`).join('');
  list.querySelectorAll('.session-item').forEach(el =>
    el.addEventListener('click', () => selectSession(el.dataset.id))
  );
}

// ── SELECT / NEW ───────────────────────────────────────────────
function selectSession(id) {
  activeId = id;
  renderSidebar();
  showEditor(sessions.find(s => s.id === id));
}

document.getElementById('btnNew').addEventListener('click', () => {
  activeId = null;
  renderSidebar();
  showEditor(null);
});

function showEditor(s) {
  document.getElementById('emptyState').style.display = 'none';
  const inner = document.getElementById('editorInner');
  inner.style.display = 'flex';
  document.getElementById('fTitle').value    = s?.title    ?? '';
  document.getElementById('fSubtitle').value = s?.subtitle ?? '';
  document.getElementById('fLocation').value = s?.location ?? '';
  document.getElementById('fCrew').value     = s?.crew     ?? DEFAULT_CREW;
  document.getElementById('fStatus').value   = s?.status   ?? 'closed';
  document.getElementById('fBody').value     = s?.body     ?? '';
  document.getElementById('btnDelete').style.display = s ? 'inline-block' : 'none';
  setStatus('', '');
}

// ── SAVE ───────────────────────────────────────────────────────
document.getElementById('btnSave').addEventListener('click', async () => {
  const title    = document.getElementById('fTitle').value.trim();
  const body     = document.getElementById('fBody').value.trim();
  if (!title || !body) {
    setStatus('CHYBA: Název a text zápisku jsou povinné.', 'error');
    return;
  }

  const data = {
    title,
    subtitle: document.getElementById('fSubtitle').value.trim(),
    location: document.getElementById('fLocation').value.trim(),
    crew:     document.getElementById('fCrew').value.trim(),
    status:   document.getElementById('fStatus').value,
    body
  };

  setBusy(true);
  setStatus('UKLÁDÁM...', '');
  try {
    await upsert(data);
    renderSidebar();
    setStatus('ULOŽENO ✓', 'ok');
  } catch (e) {
    setStatus('CHYBA: ' + e.message, 'error');
  } finally {
    setBusy(false);
  }
});

// ── DELETE ─────────────────────────────────────────────────────
document.getElementById('btnDelete').addEventListener('click', async () => {
  if (!activeId) return;
  const s = sessions.find(x => x.id === activeId);
  if (!confirm(`Smazat záznam „${s.title}"?`)) return;
  setBusy(true);
  setStatus('MAŽU...', '');
  try {
    await remove(activeId);
    activeId = null;
    renderSidebar();
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('editorInner').style.display = 'none';
    setStatus('', '');
  } catch (e) {
    setStatus('CHYBA: ' + e.message, 'error');
  } finally {
    setBusy(false);
  }
});

// ── HELPERS ────────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ' ' + type : '');
}

function setBusy(on) {
  ['btnSave','btnDelete','btnNew'].forEach(id =>
    document.getElementById(id).disabled = on
  );
}

loadData();
</script>
</body>
</html>
